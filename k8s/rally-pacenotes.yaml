apiVersion: v1
kind: Namespace
metadata:
  name: rally-pacenotes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rally-pacenotes
  namespace: rally-pacenotes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rally-pacenotes
  template:
    metadata:
      labels:
        app: rally-pacenotes
    spec:
      containers:
        - name: web
          image: 127.0.0.1:30500/rally-pacenotes:20260623-vueuse-sortable-6c0f2bc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PIPER_BIN
              value: /opt/piper-tts/piper
            - name: PIPER_MODEL
              value: /models/piper/en_US-ryan-high.onnx
            - name: PIPER_CONFIG
              value: /models/piper/en_US-ryan-high.onnx.json
            - name: PIPER_VOICE_DIR
              value: /models/piper
          volumeMounts:
            - name: piper-bin
              mountPath: /opt/piper-tts
              readOnly: true
            - name: piper-voices
              mountPath: /models/piper
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: piper-bin
          hostPath:
            path: /opt/piper-tts
            type: Directory
        - name: piper-voices
          hostPath:
            path: /home/rootster/documents/codex/Automation/models/piper
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: rally-pacenotes
  namespace: rally-pacenotes
spec:
  selector:
    app: rally-pacenotes
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rally-pacenotes
  namespace: rally-pacenotes
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - rally-pacenotes.192.168.1.48.sslip.io
      secretName: rally-pacenotes-lan-tls
    - hosts:
        - rally-pacenotes.100.115.119.27.sslip.io
      secretName: rally-pacenotes-tls
    - hosts:
        - archiebald.tail3ca6f2.ts.net
      secretName: archiebald-tailscale-tls
  rules:
    - host: rally-pacenotes.192.168.1.48.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rally-pacenotes
                port:
                  number: 80
    - host: rally-pacenotes.100.115.119.27.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rally-pacenotes
                port:
                  number: 80
    - host: archiebald.tail3ca6f2.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rally-pacenotes
                port:
                  number: 80
